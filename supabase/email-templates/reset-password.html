<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;background-color:#f5f5f3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f5f5f3;padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" width="560" style="max-width:560px;width:100%;background-color:#ffffff;border-radius:8px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="padding:32px 40px 24px 40px;">
              <span style="font-size:22px;font-weight:700;color:#1A1A1A;letter-spacing:-0.02em;">Vizly</span><span style="color:#E8553D;font-size:22px;">&#8226;</span>
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding:0 40px 32px 40px;color:#1A1A1A;font-size:15px;line-height:1.6;">
              <p style="font-size:18px;font-weight:600;margin:0 0 16px 0;">
                Reinitialise ton mot de passe
              </p>
              <p style="margin:0 0 8px 0;color:#6B6B6B;">
                Tu as demande a reinitialiser ton mot de passe. Clique sur le bouton ci-dessous pour en choisir un nouveau.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:24px 0;">
                <tr>
                  <td style="background-color:#E8553D;border-radius:6px;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 28px;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;">
                      Choisir un nouveau mot de passe
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;color:#9B9B9B;font-size:13px;">
                Si tu n'as pas fait cette demande, ignore cet email. Ton mot de passe restera inchange.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:24px 40px;border-top:1px solid #E8E6DC;color:#9B9B9B;font-size:13px;line-height:1.5;">
              Vizly &mdash; <a href="https://vizly.fr" style="color:#9B9B9B;text-decoration:underline;">vizly.fr</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
